<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Úklid Lelkova</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #F5C000;
    --black: #1F1F1F;
    --green: #22C55E;
    --green-bg: #DCFCE7;
    --red: #EF4444;
    --red-bg: #FEE2E2;
    --gray: #EEF0F2;
    --mid: #8A8F98;
    --white: #fff;
    --radius: 16px;
  }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, #FFF9E6 0%, #F7F8FA 40%);
    background-attachment: fixed;
    color: var(--black);
    min-height: 100vh;
  }

  header {
    background: var(--black);
    padding: 18px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border-radius: 0 0 20px 20px;
  }
  .header-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden; padding: 3px;
  }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; }
  header h1 { color: var(--yellow); font-size: 16px; font-weight: 800; letter-spacing: 0.03em; text-transform: uppercase; }
  .header-sub { color: #9aa; font-size: 11px; margin-top: 1px; }

  main { padding: 18px 16px 60px; max-width: 480px; margin: 0 auto; }

  .legend { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; color: #555;
    background: var(--white); padding: 6px 12px; border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .week-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    border-top: 5px solid var(--gray);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .week-card.green { border-top-color: var(--green); }
  .week-card.amber { border-top-color: var(--yellow); }
  .week-card.red   { border-top-color: var(--red); }
  .week-card.current { box-shadow: 0 6px 24px rgba(245,192,0,0.25); }

  .week-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .week-titles .week-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--mid); }
  .week-titles .week-dates { font-size: 17px; font-weight: 800; margin-top: 1px; }

  .status-badge {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 5px 11px; border-radius: 20px; white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: #15803D; }
  .badge-amber { background: #FEF3C7; color: #B45309; }
  .badge-red   { background: var(--red-bg); color: #B91C1C; }
  .badge-empty { background: var(--gray); color: var(--mid); }
  .badge-now   { background: var(--yellow); color: var(--black); }

  .worker-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 6px; margin-bottom: 6px;
  }
  .worker-row:last-child { margin-bottom: 0; }
  .worker-name {
    font-size: 13px; font-weight: 700;
    padding: 7px 16px; border-radius: 20px;
    display: inline-block;
  }

  .toggle { display: flex; gap: 8px; }
  .t-btn {
    border: 2px solid var(--gray); background: var(--white);
    border-radius: 12px; width: 46px; height: 42px;
    font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 800;
    cursor: pointer; transition: all 0.15s; color: #C2C7CE;
    display: flex; align-items: center; justify-content: center;
  }
  .t-yes.active { background: var(--green); border-color: var(--green); color: var(--white); transform: scale(1.08); box-shadow: 0 4px 12px rgba(34,197,94,0.45); }
  .t-no.active  { background: var(--red); border-color: var(--red); color: var(--white); transform: scale(1.08); box-shadow: 0 4px 12px rgba(239,68,68,0.45); }
  .t-yes:not(.active):hover { border-color: var(--green); color: var(--green); }
  .t-no:not(.active):hover  { border-color: var(--red); color: var(--red); }

  .btn-add {
    width: 100%; margin-top: 4px;
    background: var(--white); color: var(--black);
    border: 2px dashed #C9CED6; border-radius: var(--radius);
    padding: 15px; font-family: 'Poppins', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--yellow); background: #FFFCF0; color: #9A7A00; }

  .btn-less {
    width: 100%; margin-top: 8px;
    background: transparent; color: var(--mid);
    border: none; padding: 8px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .btn-less:hover { color: var(--black); }

  .sync-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--black); color: #ccc;
    font-size: 11px; font-weight: 600;
    padding: 8px 16px; text-align: center;
    z-index: 200; transition: opacity 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mid); }
  .sync-dot.ok { background: #22C55E; }
  .sync-dot.saving { background: var(--yellow); animation: pulse 0.8s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>

<script>
// ── CLOUD CONFIG (JSONBin) ───────────────────────────────────────
const BIN_ID = '6a30239cf5f4af5e29f619ba';
const MASTER_KEY = '$2a$10$RqCI0zEBk10bMdr4eXU7kujxpkl21cAjrAaCp.7ZgVLfmF0dnyyp2';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const WORKERS = [
  { id: 'kristyna', name: 'Kristýna Orlová',   bg: '#FBCFE8', text: '#9D174D' },
  { id: 'michaela', name: 'Michaela Krhutová', bg: '#E9D5FF', text: '#6B21A8' },
];

let schedule = {};       // { weekKey: { workerId: 'yes'|'no' } }
let visibleWeeks = 4;    // kolik víkendů dopředu zobrazit
let saveTimer = null;    // pro odložené ukládání
let loaded = false;      // jestli už proběhlo první načtení

// ── SYNC STATUS ──────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

// ── NAČTENÍ Z CLOUDU ─────────────────────────────────────────────
async function loadFromCloud() {
  setStatus('saving', 'Načítám…');
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const record = data.record || {};
    schedule = record.schedule || {};
    visibleWeeks = (record.visible && record.visible >= 4) ? record.visible : 4;
    loaded = true;
    setStatus('ok', 'Uloženo online ✓');
    render();
  } catch (e) {
    setStatus('error', 'Chyba spojení — zkouším znovu…');
    // Zkus znovu za 3 s
    setTimeout(loadFromCloud, 3000);
  }
}

// ── ULOŽENÍ DO CLOUDU (odložené, ať se nešetří při každém ťuknutí) ─
function saveToCloud() {
  if (!loaded) return; // nepřepiš data dřív než se načtou
  setStatus('saving', 'Ukládám…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const res = await fetch(BIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify({ schedule, visible: visibleWeeks })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setStatus('ok', 'Uloženo online ✓');
    } catch (e) {
      setStatus('error', 'Nepodařilo se uložit — zkus znovu');
    }
  }, 400);
}

// Víkend (Pá–Ne) je směna. Offset 0 = týden, do kterého spadá dnešek.
// Když je pondělí, offset 0 automaticky ukazuje na nový týden,
// takže minulý víkend přirozeně zmizí a "Tento týden" se posune dál.

function getMondayDate(offset) {
  const now = new Date();
  const dow = now.getDay() === 0 ? 7 : now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - dow + 1 + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}
function weekKey(offset) { return getMondayDate(offset).toISOString().split('T')[0]; }
function fmt(d) { return `${d.getDate()}.${d.getMonth()+1}.`; }
function getWeekNum(mon) {
  const tmp = new Date(mon); tmp.setDate(tmp.getDate() + 3);
  const ys = new Date(tmp.getFullYear(), 0, 1);
  return Math.ceil(((tmp - ys) / 86400000 + ys.getDay() + 1) / 7);
}
function weekInfo(offset) {
  const mon = getMondayDate(offset);
  const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  sun.setHours(23, 59, 59, 999);
  return {
    label: `${getWeekNum(mon)}. týden ${mon.getFullYear()}`,
    dates: `Pá ${fmt(fri)} – Ne ${fmt(sun)}`,
    isCurrent: offset === 0,
    sunEnd: sun,
  };
}

function render() {
  const el = document.getElementById('main-content');
  let html = `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22C55E"></div>Zelená – můžu</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div>Červená – nemůžu</div>
  </div>`;

  const now = new Date();
  let shownCount = 0;
  // Procházej dost týdnů dopředu — visibleWeeks udává, kolik jich chceme zobrazit
  for (let off = 0; off < visibleWeeks + 8 && shownCount < visibleWeeks; off++) {
    const info = weekInfo(off);
    // Pokud už neděle tohoto víkendu uplynula, dlaždici přeskoč
    if (info.sunEnd < now) continue;
    const wk = weekKey(off);
    const entry = schedule[wk] || {};
    const yesCount = WORKERS.filter(w => entry[w.id] === 'yes').length;
    const noCount  = WORKERS.filter(w => entry[w.id] === 'no').length;

    let color = '';
    if (yesCount === 2) color = 'green';
    else if (yesCount === 1) color = 'amber';
    else if (noCount > 0 && yesCount === 0) color = 'red';

    const isFirst = shownCount === 0;
    shownCount++;

    html += `<div class="week-card ${color} ${isFirst ? 'current' : ''}">
      <div class="week-head">
        <div class="week-titles">
          <div class="week-num">${info.label}</div>
          <div class="week-dates">${info.dates}</div>
        </div>
        ${isFirst ? `<span class="status-badge badge-now">Tento týden</span>` : ''}
      </div>`;

    WORKERS.forEach(w => {
      const v = entry[w.id];
      html += `<div class="worker-row">
        <span class="worker-name" style="background:${w.bg};color:${w.text}">${w.name}</span>
        <div class="toggle">
          <button class="t-btn t-yes ${v==='yes'?'active':''}" onclick="setAnswer('${wk}','${w.id}','yes')">✓</button>
          <button class="t-btn t-no ${v==='no'?'active':''}" onclick="setAnswer('${wk}','${w.id}','no')">✕</button>
        </div>
      </div>`;
    });

    html += `</div>`;
  }

  // Tlačítko pro přidání dalšího týdne
  html += `<button class="btn-add" onclick="addWeek()">+ Přidat další týden</button>`;
  if (visibleWeeks > 4) {
    html += `<button class="btn-less" onclick="lessWeeks()">− Zobrazit méně</button>`;
  }

  el.innerHTML = html;
}

function addWeek() {
  visibleWeeks++;
  saveToCloud();
  render();
}

function lessWeeks() {
  if (visibleWeeks > 4) { visibleWeeks--; saveToCloud(); render(); }
}

function setAnswer(wk, wId, val) {
  if (!schedule[wk]) schedule[wk] = {};
  if (schedule[wk][wId] === val) {
    delete schedule[wk][wId];
    if (!Object.keys(schedule[wk]).length) delete schedule[wk];
  } else {
    schedule[wk][wId] = val;
  }
  saveToCloud();
  render();
}

// ── START ────────────────────────────────────────────────────────
render();            // ukáže prázdnou kostru hned
loadFromCloud();     // načte data z cloudu

// Každých 15 s tiše obnov data, ať vidíš co zadali ostatní
setInterval(() => {
  // neobnovuj zrovna když se ukládá
  if (document.getElementById('sync-dot').classList.contains('saving')) return;
  fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      const rec = data.record || {};
      const newSched = JSON.stringify(rec.schedule || {});
      if (newSched !== JSON.stringify(schedule)) {
        schedule = rec.schedule || {};
        visibleWeeks = (rec.visible && rec.visible >= 4) ? rec.visible : visibleWeeks;
        render();
        setStatus('ok', 'Aktualizováno ✓');
      }
    })
    .catch(() => {});
}, 15000);

</script>
